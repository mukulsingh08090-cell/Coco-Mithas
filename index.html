<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coco Mithas Pro</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }

header {
  background:#2e7d32;
  color:white;
  text-align:center;
  padding:20px;
}

.container { padding:20px; }

.product, .cart, form {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.add { background:#2e7d32; color:white; }
.pay { background:#25D366; color:white; }

.cart-item { margin:5px 0; }

.total { font-weight:bold; font-size:18px; color:green; }

</style>
</head>

<body>

<header>
  <h1>🌴 Coco Mithas 🌴</h1>
  <p>Fresh Coconut Sweets</p>
</header>

<div class="container">

<!-- PRODUCT -->
<div class="product">
  <h2>🥥 Coconut Laddoo</h2>
  <p>₹149 / 250g</p>

  <input type="number" id="qty" value="1" min="1">

  <button class="add" onclick="addToCart()">Add to Cart</button>
</div>

<!-- CART -->
<div class="cart">
  <h3>🛒 Cart</h3>
  <div id="cartItems"></div>
  <div class="total" id="total">Total: ₹0</div>

  <button class="pay" onclick="payUPI()">💳 Pay via UPI</button>
  <button class="add" onclick="orderWhatsApp()">📲 Order on WhatsApp</button>
</div>

<!-- FORM -->
<form onsubmit="orderWhatsApp(); return false;">
  <h3>📦 Delivery Details</h3>
  <input type="text" id="name" placeholder="Name" required>
  <input type="text" id="phone" placeholder="Phone" required>
  <textarea id="address" placeholder="Address" required></textarea>
  <button class="pay">Place Order</button>
</form>

</div>

<script>
let cartQty = 0;
let price = 149;

function addToCart() {
  let qty = document.getElementById("qty").value;
  cartQty = parseInt(qty);

  let free = Math.floor(cartQty / 3); // Buy 3 Get 1
  let totalQty = cartQty + free;
  let total = cartQty * price;

  document.getElementById("cartItems").innerHTML =
    "Items: " + cartQty + " + " + free + " FREE = " + totalQty;

  document.getElementById("total").innerHTML = "Total: ₹" + total;
}

function payUPI() {
  let total = cartQty * price;
  if(total == 0) {
    alert("Add item first");
    return;
  }

  window.location.href =
    "upi://pay?pa=8303560658@ptsbi&pn=Coco%20Mithas&am=" + total + "&cu=INR";
}

function orderWhatsApp() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let free = Math.floor(cartQty / 3);
  let totalQty = cartQty + free;
  let total = cartQty * price;

  let msg =
    "Order:%0A" +
    "Coconut Laddoo: " + cartQty + "%0A" +
    "Free: " + free + "%0A" +
    "Total Qty: " + totalQty + "%0A" +
    "Total: ₹" + total + "%0A%0A" +
    "Name: " + name + "%0APhone: " + phone + "%0AAddress: " + address;

  window.open("https://wa.me/918303560658?text=" + msg);
}
</script>

</body>
</html>
